<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petopia - 讓毛孩吃得好、玩得開心</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f5f3f0; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow-x: hidden; overflow-y: auto; }
    #app { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
    .main-content { flex: 1; width: 100%; }
    .navbar { background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 0.75rem 0; position: sticky; top: 0; z-index: 100; width: 100%; }
    .navbar-content { max-width: 1400px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .nav-top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .logo { font-size: 1.5rem; font-weight: 700; color: white; cursor: pointer; }
    .nav-tabs { display: flex; gap: 0.5rem; flex-wrap: nowrap; align-items: center; justify-content: flex-start; width: 100%; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { padding: 0.5rem 1rem; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.3s; white-space: nowrap; flex-shrink: 0; }
    .nav-tab.active { background: white; color: #c9945f; }
    .nav-icons { display: flex; gap: 0.75rem; align-items: center; }
    .icon-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 2.5rem; height: 2.5rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; }
    .badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    @media (min-width: 769px) { .navbar-content { flex-direction: row; justify-content: space-between; } .nav-top-bar { width: auto; gap: 2rem; } .nav-tabs { width: auto; overflow-x: visible; } }
    .banner { background-image: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=2000&auto=format&fit=crop'); background-color: #dcc9b0; padding: 3rem 1rem; text-align: center; border-radius: 12px; margin: 2rem 1rem; color: white; min-height: 350px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .cta-button { background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%); color: white; padding: 0.75rem 2rem; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 2rem; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 1rem 1.5rem; border-radius: 8px; z-index: 2000; }
    .star-rating-btn { font-size: 1.75rem; color: #ddd; cursor: pointer; background: none; border: none; }
    .star-rating-btn.active { color: #ffc107; }
    .admin-table { width: 100%; border-collapse: collapse; background: white; }
    .admin-table th, .admin-table td { padding: 0.75rem; border-bottom: 1px solid #eee; }
  </style>
 </head>
 <body>
  <div id="app">
    <nav class="navbar">
      <div class="navbar-content">
        <div class="nav-top-bar">
          <div class="logo" onclick="switchTab('home')">🐾 Petopia</div>
          <div class="nav-icons">
            <button class="icon-btn" onclick="switchTab('cart')">🛒<span class="badge" id="cartBadge" style="display:none;">0</span></button>
            <button class="icon-btn" onclick="switchTab('member')">👤</button>
          </div>
        </div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchTab('home')">首頁</button>
          <button class="nav-tab" onclick="switchTab('products')">商城</button>
          <button class="nav-tab" onclick="switchTab('community')">社群</button>
          <button class="nav-tab" onclick="switchTab('admin')">⚙️ 後台</button>
        </div>
      </div>
    </nav>

    <div class="main-content">
      <div id="home-tab" class="tab-content active"><div class="banner"><h1>歡迎來到 Petopia</h1><button class="cta-button" onclick="switchTab('products')">開始選購</button></div></div>
      <div id="products-tab" class="tab-content"><div class="section"><h2 class="section-title">商城</h2><div id="productsGrid" class="grid-products"></div></div></div>
      <div id="community-tab" class="tab-content"><div class="section"><h2 class="section-title">社群牆</h2><div id="communityFeed"></div></div></div>
      <div id="admin-tab" class="tab-content"><div class="section"><h2 class="section-title">營運後台</h2><button onclick="exportSalesReportExcel()" class="cta-button">📥 匯出 Excel</button><table class="admin-table" style="margin-top:20px"><tbody id="adminSalesTableBody"></tbody></table></div></div>
    </div>
  </div>

  <div id="productModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>

  <script>
    let products = [{ id: '1', name: '雞肉罐頭', price: 189, rating: 4.9, reviewsList: [] }];
    let orders = [];

    function viewProductDetail(productId) {
      const product = products.find(p => p.id === productId);
      const modal = document.getElementById('productModal');
      const body = document.getElementById('modalBody');
      body.innerHTML = `
        <h2>${product.name}</h2>
        <div id="productReviewsContainer">${product.reviewsList.map(r => `<div>${r.author}: ${r.text}</div>`).join('')}</div>
        <div style="margin-top:20px;">
           <div class="star-rating">
             <button class="star-rating-btn active" onclick="currentSelectedStars=1">★</button>
             <button class="star-rating-btn active" onclick="currentSelectedStars=5">★</button>
           </div>
           <textarea id="productCommentInput" style="width:100%; border:1px solid #ddd;"></textarea>
           <button onclick="submitProductReview('${product.id}')" class="cta-button">送出評價</button>
        </div>
      `;
      modal.classList.add('active');
    }

    let currentSelectedStars = 5;
    function submitProductReview(productId) {
      const text = document.getElementById('productCommentInput').value;
      const product = products.find(p => p.id === productId);
      product.reviewsList.push({ author: '用戶', rating: currentSelectedStars, text: text, date: new Date().toLocaleDateString() });
      viewProductDetail(productId); // 重繪
      updateAdminDashboard();
    }

    function updateAdminDashboard() {
      const tableBody = document.getElementById('adminSalesTableBody');
      tableBody.innerHTML = orders.map(o => `<tr><td>${o.date}</td><td>${o.total}</td></tr>`).join('');
    }

    function exportSalesReportExcel() {
       let csv = "訂單日期,總金額\n";
       orders.forEach(o => csv += `${o.date},${o.total}\n`);
       const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
       const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = "銷售報告.csv"; link.click();
    }

    function switchTab(t) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(t + '-tab').classList.add('active');
      if(t === 'admin') updateAdminDashboard();
    }

    function closeModal() { document.getElementById('productModal').classList.remove('active'); }
  </script>
 </body>
</html>
