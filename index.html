<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petopia - 讓毛孩吃得好、玩得開心</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #f5f3f0; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif; overflow-x: hidden; overflow-y: auto; }
    #app { display: flex; flex-direction: column; width: 100%; min-height: 100vh; }
    .main-content { flex: 1; width: 100%; }
    .navbar { background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%); box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 0.75rem 0; position: sticky; top: 0; z-index: 100; width: 100%; }
    .navbar-content { max-width: 1400px; margin: 0 auto; padding: 0 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .nav-top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .logo { font-size: 1.5rem; font-weight: 700; color: white; cursor: pointer; }
    .nav-tabs { display: flex; gap: 0.5rem; flex-wrap: nowrap; align-items: center; justify-content: flex-start; width: 100%; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { padding: 0.5rem 1rem; background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.3s; white-space: nowrap; flex-shrink: 0; }
    .nav-tab.active { background: white; color: #c9945f; }
    .nav-icons { display: flex; gap: 0.75rem; align-items: center; }
    .icon-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 2.5rem; height: 2.5rem; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; position: relative; }
    .badge { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    
    @media (min-width: 769px) {
      .navbar-content { flex-direction: row; justify-content: space-between; align-items: center; }
      .nav-top-bar { width: auto; justify-content: flex-start; gap: 2rem; }
      .nav-tabs { width: auto; overflow-x: visible; }
    }

    .banner { background-image: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=2000&auto=format&fit=crop'); background-color: #dcc9b0; padding: 3rem 1rem; text-align: center; border-radius: 12px; margin: 2rem 1rem; color: white; position: relative; background-size: cover; background-position: center; min-height: 350px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.45); border-radius: 12px; z-index: 1; }
    .banner-content { position: relative; z-index: 2; }
    .cta-button { background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%); color: white; padding: 0.75rem 2rem; border: none; border-radius: 25px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
    .section { max-width: 1400px; margin: 0 auto; padding: 2rem 1rem; }
    .section-title { font-size: 1.5rem; font-weight: 700; color: #333; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: all 0.3s; cursor: pointer; }
    .product-image { width: 100%; height: 200px; background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; overflow: hidden; background-size: cover; background-position: center; }
    .add-cart-btn { width: 100%; background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%); color: white; padding: 0.75rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 12px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 2rem; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 1rem 1.5rem; border-radius: 8px; z-index: 2000; }
    .star-rating-btn { font-size: 1.75rem; color: #ddd; cursor: pointer; transition: color 0.2s; background: none; border: none; padding: 0 0.1rem; }
    .star-rating-btn.active { color: #ffc107; }
    .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    .admin-table th { background: #f5f3f0; color: #555; padding: 0.75rem 1rem; text-align: left; border-bottom: 2px solid #e1deda; }
    .admin-table td { padding: 0.875rem 1rem; border-bottom: 1px solid #eee; }
  </style>
 </head>
 <body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-content">
        <div class="nav-top-bar">
          <div class="logo" onclick="switchTab('home')">🐾 <span id="logoName">Petopia</span></div>
          <div class="nav-icons">
            <button class="icon-btn" onclick="switchTab('cart')"><svg class="lucide" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><span class="badge" id="cartBadge" style="display:none;">0</span></button>
            <button class="icon-btn" onclick="switchTab('member')"><svg class="lucide" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
          </div>
        </div>
        <div class="nav-tabs">
          <button class="nav-tab active" onclick="switchTab('home')">首頁</button>
          <button class="nav-tab" onclick="switchTab('products')">商城</button>
          <button class="nav-tab" onclick="switchTab('community')">社群</button>
          <button class="nav-tab" onclick="switchTab('knowledge')">知識專區</button>
          <button class="nav-tab" style="background: rgba(255,255,255,0.15);" onclick="switchTab('admin')">⚙️ 後台管理</button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <div id="home-tab" class="tab-content active">
        <div class="banner">
           <h1 class="banner-title">讓毛孩吃得好、玩得開心，你放心</h1>
           <button class="cta-button" onclick="switchTab('products')">探索商品</button>
        </div>
      </div>
      
      <div id="products-tab" class="tab-content">
        <div class="section">
          <h2 class="section-title">商城</h2>
          <div class="grid-products" id="productsGrid"></div>
        </div>
      </div>

      <div id="community-tab" class="tab-content">
        <div class="section">
          <h2 class="section-title">社群牆</h2>
          <div style="background: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
            <textarea id="postContent" placeholder="分享你的毛孩故事..." style="width: 100%; min-height: 100px; padding: 1rem; border: 1px solid #ddd;"></textarea>
            <input type="file" id="communityPhotoInput" accept="image/*" style="display: none;" onchange="handleCommunityPhotoUpload(event)" multiple>
            <button onclick="document.getElementById('communityPhotoInput').click()" class="cta-button" style="margin-top:10px;">📸 上傳完整照片</button>
            <div id="communityPhotoPreview" style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;"></div>
            <button class="cta-button" style="margin-top: 1rem; width: 100%;" onclick="publishPost()">發布</button>
          </div>
          <div id="communityFeed"></div>
        </div>
      </div>

      <div id="admin-tab" class="tab-content">
        <div class="section">
          <h2 class="section-title">商城營運後台</h2>
          <button onclick="exportSalesReportExcel()" class="cta-button">📥 匯出銷售報告 Excel</button>
          <div style="margin-top:20px;">
             <table class="admin-table" id="salesReportTable">
               <thead><tr><th>訂單日期</th><th>訂單編號</th><th>客戶姓名</th><th>商品明細</th><th>銷售件數</th><th>營收</th></tr></thead>
               <tbody id="adminSalesTableBody"></tbody>
             </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="productModal" class="modal"><div class="modal-content"><button class="modal-close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>

  <script>
    let products = [

    ];
    let cart = [], communityPosts = [], communityPostPhotos = [], orders = [];
