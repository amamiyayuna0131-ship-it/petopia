        description: '採用 100% 人用等級新鮮肉品製作，符合 AAFCO 營養標準。零添加防腐劑、人工香料與色素，給毛孩最純粹的營養補給。', 
        specs: { weight: '400g', type: '罐頭', petType: '狗、貓' },
        variants: [
            { id: 'v1', name: '鮮嫩純雞肉 (腸胃敏感首選)', desc: '單一肉源，極致溫和。適合腸胃敏感的毛孩，提供最純粹的高優質蛋白質，好消化易吸收。', ingredients: '新鮮雞胸肉 95%、雞高湯、雞脂、牛磺酸、維生素B群、碳酸鈣。' },
            { id: 'v2', name: '雞肉佐鮮甜南瓜 (化毛順暢配方)', desc: '添加新鮮南瓜，豐富的膳食纖維有助於腸道蠕動，幫助自然排出毛球，維持消化道健康。', ingredients: '新鮮雞胸肉 85%、鮮採南瓜 10%、雞高湯、牛磺酸、維生素E、果寡糖。' },
            { id: 'v3', name: '雞肉佐頂級鮭魚 (護膚亮毛配方)', desc: '海陸雙拼！富含 Omega-3 & 6 脂肪酸，深層滋養皮膚，讓毛髮柔順透亮，散發自然光澤。', ingredients: '新鮮雞胸肉 70%、阿拉斯加野生鮭魚 25%、鮭魚油、雞高湯、牛磺酸、綜合礦物質。' }
        ],
        images: ['canva://MAHKEvf0cQM/1', 'canva://MAHJ_aeQgZg/1', '📋'], faq: [],
        reviewsList: [{ author: '柴犬奴', rating: 5, text: '成分很純，一打開家裡的柴柴就瘋狂搖尾巴！肉質看起來非常新鮮。', date: '2026/04/12' }]
      },
      { id: '2', name: '羽毛逗貓棒', category: '玩具', price: 89, image: '🪶', rating: 4.8, reviews: 2, description: '激發貓咪獵捕本能，安全材質。', ingredients: '天然無毒羽毛、彈性塑膠桿', images: ['🪶', '🐱'], faq: [] },
      { id: '3', name: '益生菌粉 100g', category: '保健', price: 329, image: '💊', rating: 4.8, reviews: 1, description: '臨床驗證，調整腸胃，增強免疫力。', ingredients: '專利腸道益生菌群、植物性優質蛋白', images: ['💊', '🧬'], faq: [] },
      { id: '4', name: '寵物床墊（記憶棉）M/L', category: '居家', price: 899, image: '🛏️', rating: 4.7, reviews: 1, description: '舒適透氣，可水洗設計。', ingredients: '高密度記憶海綿、透氣抗菌布套', images: ['🛏️', '😴'], faq: [] }
    ];

    let productImages = {}; 
    const offerData = [{ icon: '🎉', title: '首購 7 折優惠', desc: '新會員首次購物享 7 折優惠 • 使用碼：FIRST70', badge: '7折', bgGradient: '#fff9e6', borderColor: '#ffc107' }];
    let orders = [];

    function init() {
      initOffers(); renderHotProducts(); renderProducts(); renderMemberProfile(); updateCartBadge(); lucide.createIcons();
    }

    function initOffers() {
      const track = document.getElementById('offersTrack');
      track.innerHTML = offerData.map(offer => `
        <div style="min-width: 100%; box-sizing: border-box; padding: 1.25rem 2rem; background: ${offer.bgGradient}; border-left: 4px solid ${offer.borderColor}; display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center; gap: 1.5rem;"><div style="font-size: 2.5rem;">${offer.icon}</div><div><div style="font-weight: 700; color: #333; font-size: 1.1rem;">${offer.title}</div><div style="color: #666; font-size: 0.9rem;">${offer.desc}</div></div></div><div style="color: ${offer.borderColor}; font-weight: 700; font-size: 1.5rem;">${offer.badge}</div>
        </div>
      `).join('');
    }

    function renderHotProducts() {
      const carousel = document.getElementById('hotCarousel');
      carousel.innerHTML = products.slice(0, 3).map(product => `
        <div class="carousel-item">
          <div class="product-card" onclick="viewProductDetail('${product.id}')">
            <div class="product-image">${product.imageType !== 'canva' ? product.image : '🥩'}</div>
            <div class="product-info"><div class="product-name">${product.name}</div><div class="product-price">$${product.price}</div><button class="add-cart-btn" onclick="addToCart('${product.id}'); event.stopPropagation();">加入購物車</button></div>
          </div>
        </div>
      `).join('');
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      let filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
      grid.innerHTML = filtered.map(product => `
        <div class="product-card" onclick="viewProductDetail('${product.id}')">
          <div class="product-image">${product.imageType !== 'canva' ? product.image : '🥩'}</div>
          <div class="product-info"><div class="product-name">${product.name}</div><div class="product-price">$${product.price}</div><button class="add-cart-btn" onclick="addToCart('${product.id}'); event.stopPropagation();">加入購物車</button></div>
        </div>
      `).join('');
    }

    function filterCategory(category) {
      currentFilter = category;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderProducts();
    }

    // 🌟 修改：為商品詳細頁面加上口味選擇介面與詳細成分
    function viewProductDetail(productId) {
      const product = products.find(p => p.id === productId);
      if (!product) return;
      const modal = document.getElementById('productModal');
      const body = document.getElementById('modalBody');
      
      let variantSection = '';
      if (product.variants && product.variants.length > 0) {
          variantSection = `
          <div style="margin: 1.5rem 0; background: #faf9f6; padding: 1.25rem; border-radius: 12px; border: 1px solid #eee;">
              <h3 style="font-weight: 700; color: #333; margin-bottom: 1rem; font-size: 1.1rem;">🏷️ 請選擇口味與專屬配方：</h3>
              <div style="display: flex; flex-direction: column; gap: 0.75rem;" id="variantSelector">
              ${product.variants.map((v, index) => `
                  <label style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 1rem; border: 2px solid ${index === 0 ? '#c9945f' : '#ddd'}; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: ${index === 0 ? '#fffefc' : 'white'};" onclick="selectVariant(this)">
                  <input type="radio" name="product_variant" value="${v.id}" ${index === 0 ? 'checked' : ''} style="margin-top: 0.25rem; accent-color: #c9945f; transform: scale(1.2);">
                  <div>
                      <div style="font-weight: 700; color: #333; margin-bottom: 0.25rem; font-size: 1.05rem;">${v.name}</div>
                      <div style="font-size: 0.9rem; color: #666; line-height: 1.5; margin-bottom: 0.5rem;">${v.desc}</div>
                      <div style="font-size: 0.85rem; color: #888; background: #f5f5f5; padding: 0.5rem 0.75rem; border-radius: 6px;">
                      <strong style="color: #555;">主要成分：</strong>${v.ingredients}
                      </div>
                  </div>
                  </label>
              `).join('')}
              </div>
          </div>
          `;
      } else {
          variantSection = `
          <h3 style="font-weight: 600; color: #333; margin: 1.5rem 0 0.5rem;">💡 商品特色</h3>
          <p style="color: #666; line-height: 1.6; margin-bottom: 1rem;">${product.description}</p>
          ${product.ingredients && product.ingredients !== 'N/A' ? `<div style="background: #f5f8fb; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.9rem; color: #555;"><strong style="color:#333;">主要成分：</strong>${product.ingredients}</div>` : ''}
          `;
      }

      body.innerHTML = `
        <div class="product-detail-image" style="background: #ffeaa7;">${product.imageType !== 'canva' ? product.image : '🥩'}</div>
        <h2 class="product-detail-title">${product.name}</h2>
        <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem;">
          <div class="rating"><span style="font-weight: 700; color: #333;">⭐ ${product.rating}</span></div>
          <div style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: white; background: #4caf50;">有貨</div>
        </div>
        <div class="product-detail-price">$${product.price}</div>
        
        ${variantSection}
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem; margin-bottom: 2rem;">
          <button class="cta-button" style="width: 100%;" onclick="addModalItemToCart('${product.id}')">加入購物車</button>
        </div>
      `;
      modal.classList.add('active');
    }

    // 🌟 新增：切換口味的樣式變化
    window.selectVariant = function(element) {
        const labels = element.parentElement.querySelectorAll('label');
        labels.forEach(lbl => {
            lbl.style.borderColor = '#ddd';
            lbl.style.background = 'white';
        });
        element.style.borderColor = '#c9945f';
        element.style.background = '#fffefc';
        element.querySelector('input').checked = true;
    };

    function closeModal() { document.getElementById('productModal').classList.remove('active'); }

    // 🌟 修改：處理 Modal 中選擇變體並加入購物車的邏輯
    window.addModalItemToCart = function(productId) {
        const product = products.find(p => p.id === productId);
        let selectedVariant = null;
        if (product.variants && product.variants.length > 0) {
            const checkedInput = document.querySelector('input[name="product_variant"]:checked');
            if (checkedInput) selectedVariant = product.variants.find(v => v.id === checkedInput.value);
        }
        addToCart(productId, selectedVariant);
        closeModal();
    };

    // 🌟 修改：加入購物車時，記錄選擇的口味並生成專屬 ID
    function addToCart(productId, variant = null) {
      const product = products.find(p => p.id === productId);
      
      // 如果從首頁直接點擊且有變體，預設選第一個
      let itemVariant = variant;
      if (!itemVariant && product.variants && product.variants.length > 0) {
          itemVariant = product.variants[0];
      }

      const cartItemId = itemVariant ? `${productId}-${itemVariant.id}` : productId;
      // 顯示名稱加上口味簡稱
      const cartItemName = itemVariant ? `${product.name} - ${itemVariant.name.split(' ')[0]}` : product.name;

      const existingItem = cart.find(item => item.cartItemId === cartItemId);
      if (existingItem) {
          existingItem.quantity += 1;
      } else {
          cart.push({ ...product, cartItemId: cartItemId, displayName: cartItemName, quantity: 1 });
      }
      
      updateCartBadge(); renderCart(); 
      showToast(`✅ ${cartItemName} 已加入購物車`);
    }

    function updateCartBadge() {
      const badge = document.getElementById('cartBadge');
      const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      if (badge) { if (cartCount > 0) { badge.textContent = cartCount; badge.style.display = 'flex'; } else { badge.style.display = 'none'; } }
    }

    // 🌟 修改：購物車渲染使用獨立的 displayName 和 cartItemId
    function renderCart() {
      const tbody = document.getElementById('cartBody');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl = document.getElementById('total');

      if (cart.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999; padding: 2rem;">購物車是空的</td></tr>';
        subtotalEl.textContent = '$0'; totalEl.textContent = '$0'; return;
      }

      tbody.innerHTML = cart.map(item => `
        <tr>
          <td><div class="cart-item-name">${item.displayName || item.name}</div></td>
          <td><div class="quantity-control"><button class="qty-btn" onclick="updateQuantity('${item.cartItemId}', ${item.quantity - 1})">−</button><span style="width: 30px; text-align: center;">${item.quantity}</span><button class="qty-btn" onclick="updateQuantity('${item.cartItemId}', ${item.quantity + 1})">+</button></div></td>
          <td style="font-weight: 600;">$${item.price * item.quantity}</td>
          <td><button style="background: none; border: none; color: #ff3b30; cursor: pointer; font-weight: 600;" onclick="removeFromCart('${item.cartItemId}')">刪除</button></td>
        </tr>
      `).join('');

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      subtotalEl.textContent = `$${subtotal}`; totalEl.textContent = `$${subtotal + 80}`;
    }

    function updateQuantity(cartItemId, newQuantity) {
      if (newQuantity <= 0) { removeFromCart(cartItemId); return; }
      const item = cart.find(p => p.cartItemId === cartItemId);
      if (item) { item.quantity = newQuantity; updateCartBadge(); renderCart(); }
    }

    function removeFromCart(cartItemId) {
      cart = cart.filter(item => item.cartItemId !== cartItemId);
      updateCartBadge(); renderCart(); showToast('❌ 已移除');
    }

    function applyCoupon() { showToast('✅ 優惠碼已套用'); }
    function checkout() { if (cart.length === 0) { showToast('⚠️ 購物車是空的'); return; } switchTab('checkout'); renderCheckout(); }

    function renderCheckout() {
      const checkoutContent = document.getElementById('checkoutContent');
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      checkoutContent.innerHTML = `
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem;">
          <div style="background: white; padding: 1.5rem; border-radius: 12px;"><h3 style="font-weight: 700; margin-bottom: 1rem;">收件資訊</h3><input type="text" placeholder="姓名" style="width:100%; padding: 0.75rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:8px;"></div>
          <div style="background: white; padding: 1.5rem; border-radius: 12px;"><h3 style="font-weight: 700; margin-bottom: 1rem;">訂單摘要</h3>
            ${cart.map(item => `<div style="display: flex; justify-content: space-between; padding: 0.5rem 0;"><span>${item.displayName || item.name} ×${item.quantity}</span><span>$${item.price * item.quantity}</span></div>`).join('')}
            <div style="margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem; font-weight: bold;">總計: $${subtotal + 80}</div>
            <button class="cta-button" style="width: 100%; margin-top: 1rem;" onclick="showToast('✅ 結帳成功'); cart=[]; renderCart(); updateCartBadge(); switchTab('home');">確認結帳</button>
          </div>
        </div>
      `;
    }

    function renderMemberProfile() { document.getElementById('memberProfileContent').innerHTML = `<p>${currentMember.name}</p>`; }
    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabName + '-tab').classList.add('active');
      document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
      const activeBtn = Array.from(document.querySelectorAll('.nav-tab')).find(t => t.getAttribute('onclick').includes(tabName));
      if(activeBtn) activeBtn.classList.add('active');
    }
    function showToast(msg) { const t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2500); }

    window.addEventListener('load', init);
  </script>
 </body>
