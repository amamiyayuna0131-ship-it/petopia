<!doctype html>
<html lang="zh-TW">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petopia - 讓毛孩吃得好、玩得開心</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      background: #f5f3f0;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      overflow-x: hidden; 
      overflow-y: auto;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      width: 100%;
    }

    .navbar {
      background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 0.75rem 0;
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
    }

    .navbar-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column; 
      gap: 0.75rem;
    }

    .nav-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
    }

    .nav-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: nowrap; 
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      overflow-x: auto; 
      padding-bottom: 0.25rem;
      scrollbar-width: none; 
      -webkit-overflow-scrolling: touch; 
    }

    .nav-tabs::-webkit-scrollbar {
      display: none; 
    }

    .nav-tab {
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.3s;
      white-space: nowrap; 
      flex-shrink: 0; 
    }

    .nav-tab.active {
      background: white;
      color: #c9945f;
    }

    .nav-icons {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .icon-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      position: relative;
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff3b30;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    @media (min-width: 769px) {
      .navbar-content {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .nav-top-bar {
        width: auto;
        justify-content: flex-start;
        gap: 2rem;
      }
      .nav-tabs {
        width: auto;
        overflow-x: visible;
      }
    }

    .banner {
      background-image: url('https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=2000&auto=format&fit=crop');
      background-color: #dcc9b0;
      padding: 3rem 1rem;
      text-align: center;
      border-radius: 12px;
      margin: 2rem 1rem;
      color: white;
      position: relative;
      background-size: cover;
      background-position: center;
      min-height: 350px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .banner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 12px;
      z-index: 1;
    }

    .banner-content {
      position: relative;
      z-index: 2;
    }

    .banner-title {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    .banner-subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.95);
      margin-bottom: 1.5rem;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }

    .cta-button {
      background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%);
      color: white;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(201, 148, 95, 0.3);
    }

    .section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .carousel {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding: 1rem 0;
      scroll-behavior: smooth;
    }

    .carousel-item {
      flex: 0 0 calc(33.333% - 0.67rem);
      min-width: 250px;
    }

    @media (max-width: 768px) {
      .carousel-item {
        flex: 0 0 calc(50% - 0.5rem);
        min-width: 200px;
      }
      .banner-title {
        font-size: 1.5rem;
      }
      .logo {
        font-size: 1.3rem;
      }
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: all 0.3s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.12);
      border-bottom: 3px solid #c9945f;
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
    }

    .product-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff3b30;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .product-info {
      padding: 1rem;
    }

    .product-name {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.5rem;
      line-height: 1.3;
      min-height: 2.6rem;
    }

    .product-category {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 0.75rem;
    }

    .product-price {
      font-size: 1.25rem;
      font-weight: 700;
      color: #c9945f;
      margin-bottom: 1rem;
    }

    .add-cart-btn {
      width: 100%;
      background: linear-gradient(135deg, #d4a574 0%, #c9945f 100%);
      color: white;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .add-cart-btn:hover {
      transform: scale(1.02);
    }

    .grid-products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }

    .filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 0.5rem 1rem;
      background: white;
      border: 2px solid #ddd;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .filter-btn.active {
      background: #c9945f;
      color: white;
      border-color: #c9945f;
    }

    .filter-btn:hover {
      border-color: #c9945f;
    }

    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .search-input:focus {
      outline: none;
      border-color: #c9945f;
    }

    .search-btn {
      padding: 0.75rem 1.5rem;
      background: #c9945f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .sort-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .sort-select {
      padding: 0.5rem 1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      background: white;
      font-size: 0.9rem;
    }

    .sort-select:focus {
      outline: none;
      border-color: #c9945f;
    }

    .wishlist-indicator {
      position: absolute;
      top: 10px;
      left: 10px;
      background: #ff3b30;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .product-card.in-wishlist {
      border: 2px solid #ff3b30;
    }

    .order-detail-card {
      background: #f9f9f9;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
    }

    .member-discount-banner {
      background: linear-gradient(135deg, #ff7043 0%, #ff5722 100%);
      color: white;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .cart-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden
